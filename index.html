<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario Honey-Alonso (CHAEA)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Estilos de impresión optimizados */
        @media print {
            body { background: white; color: black; padding: 0; }
            #btn-acciones-finales, .navbar, footer { display: none !important; }
            .no-print { display: none !important; }
            #pantalla-resultados { background: white !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; }
            .bg-white { border: none !important; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-12 px-4" style="font-family: 'Trebuchet MS', Arial, sans-serif;">

    <div class="max-w-[900px] mx-auto">
        
        <div id="pantalla-registro" style="background: #e8e5f2; border-radius: 20px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.08);">
            
            <div style="text-align: center; margin-bottom: 35px;">
                <h1 style="color: #7ca000; font-size: 38px; margin: 0 0 10px 0; font-weight: bold;">
                    Cuestionario Honey-Alonso (CHAEA)
                </h1>
                <p style="font-size: 18px; color: #666; margin: 0;">
                    Completá tus datos para comenzar el test automatizado de Estilos de Aprendizaje.
                </p>
            </div>

            <div style="background: white; border-radius: 15px; padding: 35px; border: 1px solid #ddd;">
                <form id="form-registro" onsubmit="iniciarCuestionario(event)" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label style="display: block; font-weight: bold; color: #555; margin-bottom: 5px; font-size: 15px;">Nombre Completo <span style="color: #aaa; font-weight: normal;">(Opcional)</span></label>
                            <input type="text" id="reg-nombre" placeholder="Ej: Juan Pérez" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; outline: none; font-family: inherit;">
                        </div>
                        <div>
                            <label style="display: block; font-weight: bold; color: #555; margin-bottom: 5px; font-size: 15px;">Edad *</label>
                            <input type="number" id="reg-edad" required min="10" max="99" placeholder="Ej: 21" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; outline: none; font-family: inherit;">
                        </div>
                        <div>
                            <label style="display: block; font-weight: bold; color: #555; margin-bottom: 5px; font-size: 15px;">Género *</label>
                            <select id="reg-genero" required style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; background: white; outline: none; font-family: inherit;">
                                <option value="" disabled selected>Seleccioná...</option>
                                <option value="Femenino">Femenino</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Otro">Otro / No binario</option>
                                <option value="Prefiero no decirlo">Prefiero no decirlo</option>
                            </select>
                        </div>
                    </div>
                    <div style="text-align: right; margin-top: 30px;">
                        <button type="submit" style="background: #4a6b0a; color: #ffffff; font-weight: bold; font-size: 18px; padding: 14px 40px; border-radius: 10px; border: none; cursor: pointer; letter-spacing: 0.5px; transition: background 0.2s;">
                            Comenzar Cuestionario →
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div id="pantalla-test" style="background: #e8e5f2; border-radius: 20px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.08);" class="hidden">
            <div style="margin-bottom: 30px;">
                <div style="display: flex; justify-content: space-between; font-weight: bold; color: #555; margin-bottom: 8px; font-size: 15px;">
                    <span id="txt-progreso-bloque">Bloque 1 de 8</span>
                    <span id="txt-progreso-porcentaje">0% Completado</span>
                </div>
                <div style="width: 100%; background-color: #e0e0e0; border-radius: 50px; height: 12px; overflow: hidden;">
                    <div id="barra-progreso" style="background: #7CA000; height: 12px; width: 12.5%; transition: width 0.3s ease;"></div>
                </div>
            </div>

            <div id="contenedor-preguntas" style="background: white; border-radius: 15px; padding: 30px;" class="space-y-6">
                </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px;">
                <button id="btn-anterior" onclick="cambiarBloque(-1)" style="background: white; color: #555; font-weight: bold; padding: 12px 25px; border-radius: 10px; border: 2px solid #ccc; cursor: pointer;">
                    ← Anterior
                </button>
                <button id="btn-siguiente" onclick="cambiarBloque(1)" style="background: #4a6b0a; color: white; font-weight: bold; padding: 12px 35px; border-radius: 10px; border: none; cursor: pointer;">
                    Siguiente →
                </button>
            </div>
        </div>

        <div id="pantalla-resultados" style="background: #e8e5f2; border-radius: 20px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.08);" class="hidden">
            <h2 style="color: #4a6500; font-size: 32px; text-align: center; margin-top: 0; margin-bottom: 5px;">📊 <strong>Tus Resultados</strong></h2>
            <p id="res-metadata" style="text-align: center; color: #666; font-size: 16px; margin-bottom: 30px;"></p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-white p-6 rounded-xl">
                <div class="w-full max-w-[340px] mx-auto aspect-square">
                    <canvas id="graficoRadar"></canvas>
                </div>

                <div class="overflow-x-auto">
                    <table style="width: 100%; border-collapse: collapse; font-size: 16px;">
                        <thead>
                            <tr style="border-b: 2px solid #ddd; text-align: left; color: #555;">
                                <th style="padding-bottom: 12px; font-weight: bold;">Estilo</th>
                                <th style="padding-bottom: 12px; text-align: center; font-weight: bold;">Puntaje</th>
                                <th style="padding-bottom: 12px; text-align: right; font-weight: bold;">Preferencia</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-cuerpo" style="color: #333;">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="btn-acciones-finales" style="text-align: center; margin-top: 35px; display: flex; justify-content: center; gap: 15px;">
                <button onclick="window.print()" style="background: #4a6b0a; color: white; font-weight: bold; padding: 12px 30px; border-radius: 10px; border: none; cursor: pointer;">
                    📥 Guardar como PDF / Imprimir
                </button>
                <button onclick="window.location.reload()" style="background: #7CA000; color: white; font-weight: bold; padding: 12px 30px; border-radius: 10px; border: none; cursor: pointer;">
                    Realizar otra consulta 🔄
                </button>
            </div>
        </div>
    </div>

    <script>
        // Transcripción e indexación corregida: 1=Activo, 2=Reflexivo, 3=Teórico, 4=Pragmático
        const preguntas = [
            { id: 1, texto: "Tengo fama de decir lo que pienso claramente sin rodeos.", estilo: "activo" },
            { id: 2, texto: "Estoy seguro(a) de lo que es bueno y lo que es malo, lo que está bien y lo que esta mal.", estilo: "reflexivo" },
            { id: 3, texto: "Muchas veces actúo sin mirar las consecuencias.", estilo: "teorico" },
            { id: 4, texto: "Normalmente trato de resolver los problemas metódicamente y paso a paso.", estilo: "pragmatico" },
            { id: 5, texto: "Creo que los formalismos coartan y limitan la actuación libre de las personas.", estilo: "activo" },
            { id: 6, texto: "Me interesa saber cuáles son los sistemas de valores de los demás y con qué criterios actúan.", estilo: "reflexivo" },
            { id: 7, texto: "Pienso que el actuar intuitivamente puede ser siempre tan válido como actuar reflexivamente.", estilo: "teorico" },
            { id: 8, texto: "Creo que lo más importante es que las cosas funcionen.", estilo: "pragmatico" },
            { id: 9, texto: "Procuro estar al tanto de lo que ocurre aquí y ahora.", estilo: "activo" },
            { id: 10, texto: "Disfruto cuando tengo tiempo para preparar mi trabajo y realizarlo a conciencia.", estilo: "reflexivo" },
            { id: 11, texto: "Estoy a gusto siguiendo un orden, en las comidas, en el estudio, haciendo ejercicio regularmente.", estilo: "teorico" },
            { id: 12, texto: "Cuando escucho una nueva idea enseguida comienzo a pensar cómo ponerla en práctica.", estilo: "pragmatico" },
            { id: 13, texto: "Prefiero las ideas originales y novedosas aunque no sean prácticas.", estilo: "activo" },
            { id: 14, texto: "Admito y me ajusto a las normas sólo si me sirven para lograr mis objetivos.", estilo: "reflexivo" },
            { id: 15, texto: "Normalmente encajo bien con personas reflexivas, y me cuesta sintonizar con personas demasiado espontáneas, imprevisibles.", estilo: "teorico" },
            { id: 16, texto: "Escucho con más frecuencia que hablo.", estilo: "pragmatico" },
            { id: 17, texto: "Prefiero las cosas estructuradas a las desordenadas.", estilo: "activo" },
            { id: 18, texto: "Cuando poseo cualquier información, trato de interpretarla bien antes de manifestar alguna conclusión.", estilo: "reflexivo" },
            { id: 19, texto: "Antes de hacer algo estudio con cuidado sus ventajas e inconvenientes.", estilo: "teorico" },
            { id: 20, texto: "Me crezco con el reto de hacer algo nuevo y diferente.", estilo: "pragmatico" },
            { id: 21, texto: "Casi siempre procuro ser coherentemente con mi sistema de valores y principios.", estilo: "activo" },
            { id: 22, texto: "En las discusiones me gusta ir directamente al grano.", estilo: "reflexivo" },
            { id: 23, texto: "Me disgusta implicarme afectivamente en mi ambiente de trabajo, prefiero mantener relaciones distantes.", estilo: "teorico" },
            { id: 24, texto: "Me gustan más las personas realistas y concretas que las teóricas.", estilo: "pragmatico" },
            { id: 25, texto: "Me cuesta ser creativo(a), romper estructuras.", estilo: "activo" },
            { id: 26, texto: "Me siento agusto con personas espontáneas y divertidas.", estilo: "reflexivo" },
            { id: 27, texto: "La mayoría de las veces expreso abiertamente cómo me siento.", estilo: "teorico" },
            { id: 28, texto: "Me gusta analizar y dar vueltas a las cosas.", estilo: "pragmatico" },
            { id: 29, texto: "Me molesta que la gente no se tome enserio las cosas.", estilo: "activo" },
            { id: 30, texto: "Me atrae experimentar y prácticar las últimas técnicas y novedades.", estilo: "reflexivo" },
            { id: 31, texto: "Soy cauteloso(a) a la hora de sacar conclusiones.", estilo: "teorico" },
            { id: 32, texto: "Prefiero contar con el mayor número de fuentes de información. Cuantos más datos reúna para reflexionar, mejor.", estilo: "pragmatico" },
            { id: 33, texto: "Tiendo a ser perfeccionista.", estilo: "activo" },
            { id: 34, texto: "Prefiero oír las opiniones de los demás antes de exponer la mía.", estilo: "reflexivo" },
            { id: 35, texto: "Me gusta afrontar la vida espontáneamente y no tener que planificar todo previamente.", estilo: "teorico" },
            { id: 36, texto: "En las discusiones me gusta observar cómo actúan los demás participantes.", estilo: "pragmatico" },
            { id: 37, texto: "Me siento incómodo(a) con las personas calladas y demasiado analíticas.", estilo: "activo" },
            { id: 38, texto: "Juzgo con frecuencia las ideas de los demás por su valor práctico.", estilo: "reflexivo" },
            { id: 39, texto: "Me agobio si me obligan a acelerar mucho el trabajo para cumplir un plazo.", estilo: "teorico" },
            { id: 40, texto: "En las reuniones apoyo las ideas prácticas y realistas.", estilo: "pragmatico" },
            { id: 41, texto: "Es mejor gozar el momento presente que deleitarse pensando en el pasado o en el futuro.", estilo: "activo" },
            { id: 42, texto: "Me molestan las personas que siempre desean apresurar las cosas.", estilo: "reflexivo" },
            { id: 43, texto: "Aporto ideas nuevas y espontáneas en los grupos de discusión.", estilo: "teorico" },
            { id: 44, texto: "Pienso que son más consistentes las desiciones fundamentadas en un minucioso análisis que las basadas en la intuición.", estilo: "pragmatico" },
            { id: 45, texto: "Detecto frecuentemente la inconsistencia y puntos débiles en las argumentaciones de los demás.", estilo: "activo" },
            { id: 46, texto: "Creo que es preciso saltarse las normas muchas más veces que cumplirlas.", estilo: "reflexivo" },
            { id: 47, texto: "A menudo caigo en la cuenta de otras formas mejores y más prácticas de hacer las cosas.", estilo: "teorico" },
            { id: 48, texto: "En conjunto hablo más que escucho.", estilo: "pragmatico" },
            { id: 49, texto: "Prefiero distanciarme de los hechos y observarlos desde otra perspectiva.", estilo: "activo" },
            { id: 50, texto: "Estoy convencido(a) que debe imponerse la lógica y el razonamiento.", estilo: "reflexivo" },
            { id: 51, texto: "Me gusta buscar nuevas experiencias.", estilo: "teorico" },
            { id: 52, texto: "Me gusta experimentar y aplicar las cosas.", estilo: "pragmatico" },
            { id: 53, texto: "Pienso que debemos llegar pronto al grano, al meollo de los temas.", estilo: "activo" },
            { id: 54, texto: "Siempre trato de conseguir conclusiones e ideas claras.", estilo: "reflexivo" },
            { id: 55, texto: "Prefiero discutir cuestiones concretas y no perder el tiempo con charlas vacías.", estilo: "teorico" },
            { id: 56, texto: "Me impaciento cuando me dan explicaciones irrelevantes e incoherentes.", estilo: "pragmatico" },
            { id: 57, texto: "Compruebo antes si las cosas funcionan realmente.", estilo: "activo" },
            { id: 58, texto: "Hago varios borradores antes de la redacción definitiva de un trabajo.", estilo: "reflexivo" },
            { id: 59, texto: "Soy conciente de que en las discusiones ayudo a mantenera los demás centrados en el tema, evitando divagaciones.", estilo: "teorico" },
            { id: 60, texto: "Observo que, con frecuencia, soy uno(a) de los(as) más objetivos(as) y desapasionados(as) en las discusiones.", estilo: "pragmatico" },
            { id: 61, texto: "Cuando algo va mal, le quito importancia y trato de hacerlo mejor.", estilo: "activo" },
            { id: 62, texto: "Rechazo ideas originales y espontáneas si no las veo prácticas.", estilo: "reflexivo" },
            { id: 63, texto: "Me gusta sopesar diversas alternativas antes de tomar una decisión.", estilo: "teorico" },
            { id: 64, texto: "Con frecuencia miro hacia adelante para prever el futuro.", estilo: "pragmatico" },
            { id: 65, texto: "En los debates y discusiones prefiero desempeñar un papel secundario antes que ser el/la líder o el/la que más participa.", estilo: "activo" },
            { id: 66, texto: "Me molestan las personas que no actúan con lógica.", estilo: "reflexivo" },
            { id: 67, texto: "Me resulta incómodo tener que planificar y prever las cosas.", estilo: "teorico" },
            { id: 68, texto: "Creo que el fin justifica los medios en muchos casos.", estilo: "pragmatico" },
            { id: 69, texto: "Suelo reflexionar sobre los asuntos y problemas.", estilo: "activo" },
            { id: 70, texto: "El trabajar a conciencia me llena de satisfación y orgullo.", estilo: "reflexivo" },
            { id: 71, texto: "Ante los acontecimientos trato de descubrir los principios y teorías en que se basan.", estilo: "teorico" },
            { id: 72, texto: "Con tal de conseguir el objetivo que pretendo soy capaz de herir sentimientos ajenos.", estilo: "pragmatico" },
            { id: 73, texto: "Cuando algo va mal, le quito importancia y trato de hacerlo mejor.", estilo: "activo" },
            { id: 74, texto: "En los debates y discusiones prefiero desempeñar un papel secundario antes que ser el/la líder o el/la que más participa.", estilo: "reflexivo" },
            { id: 75, texto: "Me aburro enseguida con el trabajo metódico y minucioso.", estilo: "teorico" },
            { id: 76, texto: "La gente con frecuencia cree que soy poco sensible a sus sentimientos.", estilo: "pragmatico" },
            { id: 77, texto: "Suelo dejarme llevar por mis intuiciones.", estilo: "activo" },
            { id: 78, texto: "Si trabajo en grupo procuro que se siga un método y un orden.", estilo: "reflexivo" },
            { id: 79, texto: "Con frecuencia me interesa averiguar lo que piensa la gente.", estilo: "teorico" },
            { id: 80, texto: "Esquivo los temas subjetivos, ambiguos y poco claros.", estilo: "pragmatico" }
        ];

        let respuestasUsuario = {};
        let bloqueActual = 0;
        const preguntasPorBloque = 10;
        let datosEstudiante = {};

        preguntas.forEach(p => respuestasUsuario[p.id] = null);

        function iniciarCuestionario(e) {
            e.preventDefault();
            datosEstudiante = {
                nombre: document.getElementById('reg-nombre').value || 'Anónimo',
                edad: document.getElementById('reg-edad').value,
                genero: document.getElementById('reg-genero').value,
                fecha: new Date().toLocaleDateString()
            };
            document.getElementById('pantalla-registro').classList.add('hidden');
            document.getElementById('pantalla-test').classList.remove('hidden');
            renderizarBloque();
        }

        function seleccionarRespuesta(idPregunta, valor) {
            respuestasUsuario[idPregunta] = valor;
            const btnSi = document.getElementById(`btn-si-${idPregunta}`);
            const btnNo = document.getElementById(`btn-no-${idPregunta}`);

            if (valor === "SÍ") {
                btnSi.style.background = "#7CA000"; btnSi.style.color = "white"; btnSi.style.borderColor = "#7CA000";
                btnNo.style.background = "white"; btnNo.style.color = "#555"; btnNo.style.borderColor = "#ccc";
            } else {
                btnSi.style.background = "white"; btnSi.style.color = "#555"; btnSi.style.borderColor = "#ccc";
                btnNo.style.background = "#d32f2f"; btnNo.style.color = "white"; btnNo.style.borderColor = "#d32f2f";
            }
        }

        function renderizarBloque() {
            const contenedor = document.getElementById('contenedor-preguntas');
            contenedor.innerHTML = '';
            
            const inicio = bloqueActual * preguntasPorBloque;
            const fin = inicio + preguntasPorBloque;
            const preguntasBloque = preguntas.slice(inicio, fin);

            preguntasBloque.forEach(p => {
                const div = document.createElement('div');
                div.style.display = "flex";
                div.style.flexDirection = window.innerWidth < 640 ? "column" : "row";
                div.style.justifyContent = "space-between";
                div.style.alignItems = window.innerWidth < 640 ? "flex-start" : "center";
                div.style.padding = "15px 0";
                div.style.borderBottom = "1px solid #f0f0f0";
                div.style.gap = "15px";

                const resActiva = respuestasUsuario[p.id];
                
                const estiloSi = resActiva === "SÍ" ? "background: #7CA000; color: white; border-color: #7CA000;" : "background: white; color: #555; border-color: #ccc;";
                const estiloNo = resActiva === "NO" ? "background: #d32f2f; color: white; border-color: #d32f2f;" : "background: white; color: #555; border-color: #ccc;";

                div.innerHTML = `
                    <div style="flex: 1; font-size: 17px; color: #333;">
                        <strong><span style="color: #7CA000;">${p.id}.</span></strong> ${p.texto}
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" id="btn-si-${p.id}" onclick="seleccionarRespuesta(${p.id}, 'SÍ')" style="padding: 8px 25px; font-weight: bold; border-radius: 8px; border: 2px solid; cursor: pointer; ${estiloSi}">SÍ</button>
                        <button type="button" id="btn-no-${p.id}" onclick="seleccionarRespuesta(${p.id}, 'NO')" style="padding: 8px 25px; font-weight: bold; border-radius: 8px; border: 2px solid; cursor: pointer; ${estiloNo}">NO</button>
                    </div>
                `;
                contenedor.appendChild(div);
            });

            const totalBloques = Math.ceil(preguntas.length / preguntasPorBloque);
            document.getElementById('txt-progreso-bloque').innerText = `Bloque ${bloqueActual + 1} de ${totalBloques}`;
            
            const porcentaje = Math.round(((bloqueActual + 1) / totalBloques) * 100);
            document.getElementById('txt-progreso-porcentaje').innerText = `${porcentaje}% Completado`;
            document.getElementById('barra-progreso').style.width = `${porcentaje}%`;

            document.getElementById('btn-anterior').style.visibility = (bloqueActual === 0) ? 'hidden' : 'visible';
            document.getElementById('btn-siguiente').innerText = (bloqueActual === totalBloques - 1) ? 'Finalizar y Calcular 📊' : 'Siguiente →';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cambiarBloque(direccion) {
            const totalBloques = Math.ceil(preguntas.length / preguntasPorBloque);
            
            if (direccion === 1) {
                const inicio = bloqueActual * preguntasPorBloque;
                const fin = inicio + preguntasPorBloque;
                const preguntasBloque = preguntas.slice(inicio, fin);
                
                const sinResponder = preguntasBloque.some(p => respuestasUsuario[p.id] === null);
                if (sinResponder) {
                    alert("Por favor, respondé todas las afirmaciones del bloque actual antes de continuar.");
                    return;
                }
            }

            if (direccion === 1 && bloqueActual === totalBloques - 1) {
                calcularYMostrarResultados();
            } else {
                bloqueActual += direccion;
                renderizarBloque();
            }
        }

        function obtenerPreferencia(estilo, puntaje) {
            const baremos = {
                activo:     { muyBaja: [0,6],   baja: [7,8],   moderada: [9,12],  alta: [13,14], muyAlta: [15,20] },
                reflexivo:  { muyBaja: [0,10],  baja: [11,13], moderada: [14,17], alta: [18,19], muyAlta: [20,20] },
                teorico:    { muyBaja: [0,6],   baja: [7,9],   moderada: [10,13], alta: [14,15], muyAlta: [16,20] },
                pragmatico: { muyBaja: [0,8],   baja: [9,10],  moderada: [11,13], alta: [14,15], muyAlta: [16,20] }
            };
            const b = baremos[estilo];
            if (puntaje >= b.muyBaja[0] && puntaje <= b.muyBaja[1]) return "Muy Baja";
            if (puntaje >= b.baja[0] && puntaje <= b.baja[1]) return "Baja";
            if (puntaje >= b.moderada[0] && puntaje <= b.moderada[1]) return "Moderada";
            if (puntaje >= b.alta[0] && puntaje <= b.alta[1]) return "Alta";
            return "Muy Alta";
        }

        function calcularYMostrarResultados() {
            let puntajes = { activo: 0, reflexivo: 0, teorico: 0, pragmatico: 0 };
            preguntas.forEach(p => { if (respuestasUsuario[p.id] === "SÍ") puntajes[p.estilo]++; });

            document.getElementById('pantalla-test').classList.add('hidden');
            document.getElementById('pantalla-resultados').classList.remove('hidden');

            document.getElementById('res-metadata').innerText = `Estudiante: ${datosEstudiante.nombre} | Edad: ${datosEstudiante.edad} años | Género: ${datosEstudiante.genero} | Fecha: ${datosEstudiante.fecha}`;

            const cuerpo = document.getElementById('tabla-cuerpo');
            cuerpo.innerHTML = '';
            
            const mapeoEstilos = [
                { key: 'activo', label: 'E. ACTIVO', color: '#9DCA07' },
                { key: 'reflexivo', label: 'E. REFLEXIVO', color: '#7CA000' },
                { key: 'teorico', label: 'E. TEÓRICO', color: '#4A6500' },
                { key: 'pragmatico', label: 'E. PRAGMÁTICO', color: '#C8DB84' }
            ];

            mapeoEstilos.forEach(est => {
                const pto = puntajes[est.key];
                const pref = obtenerPreferencia(est.key, pto);
                const tr = document.createElement('tr');
                tr.style.borderBottom = "1px solid #f0f0f0";
                tr.innerHTML = `
                    <td style="padding: 12px 0; font-weight: bold; color: ${est.color}">${est.label}</td>
                    <td style="padding: 12px 0; text-align: center; font-weight: bold; font-size: 18px;">${pto} / 20</td>
                    <td style="padding: 12px 0; text-align: right;"><span style="background: #f0f0f0; padding: 4px 12px; border-radius: 50px; font-size: 13px; font-weight: bold; color: #555;">${pref}</span></td>
                `;
                cuerpo.appendChild(tr);
            });

            const ctx = document.getElementById('graficoRadar').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Activo', 'Reflexivo', 'Teórico', 'Pragmático'],
                    datasets: [{
                        data: [puntajes.activo, puntajes.reflexivo, puntajes.teorico, puntajes.pragmatico],
                        backgroundColor: 'rgba(124, 160, 0, 0.2)',
                        borderColor: '#7CA000',
                        borderWidth: 3,
                        pointBackgroundColor: '#4A6500',
                        pointBorderColor: '#fff',
                        pointRadius: 4
                    }]
                },
                options: {
                    scales: { r: { suggestedMin: 0, suggestedMax: 20, ticks: { stepSize: 4 } } },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
