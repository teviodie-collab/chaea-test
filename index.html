<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario CHAEA - Estilos de Aprendizaje</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased text-gray-800">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-700 tracking-tight sm:text-4xl">Cuestionario CHAEA</h1>
            <p class="text-gray-500 mt-2 text-lg">Identificá tu Estilo de Aprendizaje dominante</p>
        </header>

        <div id="pantalla-registro" class="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-gray-100">
            <h2 class="text-xl font-bold text-gray-700 mb-6 border-b pb-3">Información del Estudiante</h2>
            <form id="form-registro" onsubmit="iniciarCuestionario(event)" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Nombre Completo *</label>
                        <input type="text" id="reg-nombre" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Código / Legajo</label>
                        <input type="text" id="reg-codigo" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Edad *</label>
                        <input type="number" id="reg-edad" required min="10" max="100" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl shadow-md transition duration-200 cursor-pointer">
                        Comenzar Cuestionario
                    </button>
                </div>
            </form>
        </div>

        <div id="pantalla-test" class="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-gray-100 hidden">
            <div class="mb-6">
                <div class="flex justify-between items-center text-sm font-medium text-gray-500 mb-2">
                    <span id="txt-progreso-bloque">Bloque 1 de 8</span>
                    <span id="txt-progreso-porcentaje">0% Completado</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="barra-progreso" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 12.5%"></div>
                </div>
            </div>

            <p class="text-sm text-gray-500 mb-6 italic">Instrucciones: Respondé "SÍ" si estás de acuerdo con la afirmación o "NO" si estás en desacuerdo.</p>

            <div id="contenedor-preguntas" class="space-y-6 divide-y divide-gray-100">
                </div>

            <div class="flex justify-between items-center pt-8 mt-6 border-t border-gray-100">
                <button id="btn-anterior" onclick="cambiarBloque(-1)" class="px-6 py-2 border border-gray-300 text-gray-600 font-semibold rounded-xl hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer">
                    Anterior
                </button>
                <button id="btn-siguiente" onclick="cambiarBloque(1)" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-md cursor-pointer">
                    Siguiente
                </button>
            </div>
        </div>

        <div id="pantalla-resultados" class="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-gray-100 hidden">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">Resultados del Diagnóstico</h2>
            <p id="res-metadata" class="text-center text-gray-500 mb-8"></p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                <div class="relative max-w-sm mx-auto w-full aspect-square">
                    <canvas id="graficoRadar"></canvas>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b-2 border-gray-200">
                                <th class="pb-3 font-bold text-gray-600">Estilo</th>
                                <th class="pb-3 text-center font-bold text-gray-600">Puntaje</th>
                                <th class="pb-3 text-right font-bold text-gray-600">Preferencia</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-cuerpo" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t text-center">
                <button onclick="window.location.reload()" class="bg-gray-600 hover:bg-gray-700 text-white font-semibold px-6 py-2 rounded-xl transition duration-150 cursor-pointer">
                    Reiniciar Test
                </button>
            </div>
        </div>
    </div>

    <script>
        const preguntas = [
            { id: 1, texto: "Tengo fama de decir lo que pienso claramente sin rodeos.", estilo: "pragmatico" },

            { id: 12, texto: "Cuando escucho una nueva idea enseguida comienzo a pensar cómo ponerla en práctica.", estilo: "pragmatico" },
            { id: 13, texto: "Prefiero las ideas originales y novedosas aunque no sean prácticas.", estilo: "activo" },
            { id: 14, texto: "Admito y me ajusto a las normas sólo si me sirven para lograr mis objetivos.", estilo: "pragmatico" },
            { id: 15, texto: "Normalmente encajo bien con personas reflexivas, y me cuesta sintonizar con personas demasiado espontáneas e imprevisibles.", estilo: "teorico" },
            { id: 16, texto: "Escucho con más frecuencia que hablo.", estilo: "reflexivo" },
            { id: 17, texto: "Prefiero las cosas estructuradas a las desestructuradas.", estilo: "teorico" },
            { id: 18, texto: "Cuando poseo cualquier información trato de interpretarla bien antes de manifestar alguna conclusión.", estilo: "reflexivo" },
            { id: 19, texto: "Antes de hacer una discusión prefiero meditar lo que voy a decir.", estilo: "reflexivo" },
            { id: 20, texto: "Me crezco con el reto de las nuevas experiencias.", estilo: "activo" },
            { id: 21, texto: "Casi siempre procuro ser coherente con mis criterios y sistemas de valores. Tengo principios seguros.", estilo: "teorico" },
            { id: 22, texto: "En las discusiones me gusta ir directamente al grano.", estilo: "pragmatico" },
            { id: 23, texto: "Me distancio de la gente de trato demasiado informal, propenso a la broma y a la ironía.", estilo: "teorico" },
            { id: 24, texto: "Me gusta afrontar la vida con espontaneidad y no tener que planificarlo todo antes.", estilo: "pragmatico" },
            { id: 25, texto: "Prefiero las ideas basadas en sólidos fundamentos teóricos.", estilo: "teorico" },
            { id: 26, texto: "Me molesta tener que seguir un enfoque minucioso y metódico.", estilo: "activo" },
            { id: 27, texto: "Abiertamente y de forma creativa busco la forma de cambiar las cosas.", estilo: "activo" },
            { id: 28, texto: "Prefiero reflexionar primero sobre el asunto y ser prudente antes de sacar una conclusión.", estilo: "reflexivo" },
            { id: 29, texto: "Me gusta analizar y descomponer las cosas en sus partes.", estilo: "teorico" },
            { id: 30, texto: "Me gusta controlar mis emociones y guiarme por la lógica.", estilo: "pragmatico" },
            { id: 31, texto: "Tengo tendencia a ser analítico y mirar las cosas desde diferentes prismas.", estilo: "reflexivo" },
            { id: 32, texto: "Prefiero contar con el mayor número de fuentes de información antes de decidir.", estilo: "reflexivo" },
            { id: 33, texto: "Suelo estructurar mis argumentos de forma coherente.", estilo: "teorico" },
            { id: 34, texto: "En los grupos de trabajo prefiero observar el comportamiento de los participantes.", estilo: "reflexivo" },
            { id: 35, texto: "Me cuesta trabajo planificar y prever con detalle.", estilo: "activo" },
            { id: 36, texto: "Me incomoda tener que hacer las cosas con prisa o de manera imprevista.", estilo: "reflexivo" },
            { id: 37, texto: "Suelo ser el alma de la fiesta en las reuniones sociales.", estilo: "activo" },
            { id: 38, texto: "En las reuniones me aburro si se discute sobre teorías generales y abstractas.", estilo: "pragmatico" },
            { id: 39, texto: "Me gusta sopesar los pros y los contras antes de tomar una decisión.", estilo: "reflexivo" },
            { id: 40, texto: "Me atrae probar cosas nuevas en la práctica.", estilo: "pragmatico" },
            { id: 41, texto: "Me aburro enseguida si tengo que realizar un trabajo minucioso.", estilo: "activo" },
            { id: 42, texto: "A la hora de resolver un problema, prefiero contar con una guía clara y precisa.", estilo: "reflexivo" },
            { id: 43, texto: "Me gusta participar activamente en debates y discusiones.", estilo: "activo" },
            { id: 44, texto: "En las discusiones prefiero escuchar las opiniones de los demás antes de dar la mía.", estilo: "reflexivo" },
            { id: 45, texto: "Me molesta que las personas no sigan un orden lógico en sus ideas.", estilo: "teorico" },
            { id: 46, texto: "Suelo dejarme llevar por mis intuiciones del momento.", estilo: "activo" },
            { id: 47, texto: "Me gusta aplicar inmediatamente lo aprendido en la vida real.", estilo: "pragmatico" },
            { id: 48, texto: "Me resulta fácil sintonizar con personas muy expresivas y dinámicas.", estilo: "activo" },
            { id: 49, texto: "Soy prudente a la hora de juzgar a las personas.", estilo: "reflexivo" },
            { id: 50, texto: "Me gusta que las explicaciones sean detalladas, claras y analíticas.", estilo: "teorico" },
            { id: 51, texto: "Me cuesta mantener la concentración en tareas largas y rutinarias.", estilo: "activo" },
            { id: 52, texto: "Prefiero las técnicas prácticas que dan resultados directos.", estilo: "pragmatico" },
            { id: 53, texto: "Me gusta experimentar y ver qué pasa si cambio las variables.", estilo: "pragmatico" },
            { id: 54, texto: "Me esfuerzo por descubrir teorías sólidas que den coherencia a mi conocimiento.", estilo: "teorico" },
            { id: 55, texto: "Me tomo el tiempo necesario para reflexionar sobre lo que he observado.", estilo: "reflexivo" },

            { id: 58, texto: "Prefiero repasar mentalmente los detalles de un asunto antes de actuar.", estilo: "reflexivo" },

            { id: 61, texto: "Me gusta iniciar proyectos nuevos antes que terminar los anteriores.", estilo: "activo" },
            { id: 62, texto: "Prefiero centrarme en resolver problemas reales más que en teorías.", estilo: "pragmatico" },
            { id: 63, texto: "Suelo sopesar los diferentes enfoques de una situación antes de intervenir.", estilo: "reflexivo" },
            { id: 64, texto: "Trato de anticiparme al futuro planificando con rigor.", estilo: "teorico" },
            { id: 65, texto: "En las discusiones prefiero un rol secundario para analizar mejor la situación.", estilo: "reflexivo" },
            { id: 66, texto: "Me causan rechazo los argumentos poco rigurosos o ilógicos.", estilo: "teorico" },
            { id: 67, texto: "Prefiero adaptarme al imprevisto antes que planificar minuciosamente.", estilo: "activo" },
            { id: 68, texto: "Creo que el fin justifica los medios en muchos casos.", estilo: "pragmatico" },
            { id: 69, texto: "Dedico tiempo voluntariamente a meditar sobre los problemas complejos.", estilo: "reflexivo" },
            { id: 70, texto: "Trabajar de manera minuciosa y concienzuda me produce una gran satisfacción.", estilo: "reflexivo" },
            { id: 71, texto: "Ante cualquier hecho busco la ley o principio general en que se apoya.", estilo: "teorico" },
            { id: 72, texto: "Considero que lograr la efectividad es más importante que herir susceptibilidades.", estilo: "pragmatico" },
            { id: 73, texto: "Hago lo necesario para que mi trabajo sea resolutivo y directo.", estilo: "pragmatico" },
            { id: 74, texto: "Disfruto siendo el centro de atención en las dinámicas de equipo.", estilo: "activo" },
            { id: 75, texto: "Me aburro rápidamente ante rutinas metódicas muy prolongadas.", estilo: "activo" },
            { id: 76, texto: "Suelo mostrar frialdad y pragmatismo ante problemas muy emocionales.", estilo: "pragmatico" },
            { id: 77, texto: "Me fío mucho de mis corazonadas e impulsos.", estilo: "activo" },
            { id: 78, texto: "Si coordino un grupo, procuro que se cumpla estrictamente una metodología ordenada.", estilo: "teorico" },
            { id: 79, texto: "Prefiero postergar una decisión si siento que me falta analizar variables.", estilo: "reflexivo" },
            { id: 80, texto: "Me molesta que se queden cabos sueltos en un razonamiento lógico.", estilo: "teorico" }
        ];

        // Ahora guardamos textualmente "SÍ", "NO" o null (si no se respondió)
        let respuestasUsuario = {};
        let bloqueActual = 0;
        const preguntasPorBloque = 10;
        let datosEstudiante = {};

        // Inicializamos todo vacío
        preguntas.forEach(p => respuestasUsuario[p.id] = null);

        function iniciarCuestionario(e) {
            e.preventDefault();
            datosEstudiante = {
                nombre: document.getElementById('reg-nombre').value,
                codigo: document.getElementById('reg-codigo').value || 'N/C',
                edad: document.getElementById('reg-edad').value,
                fecha: new Date().toLocaleDateString()
            };
            document.getElementById('pantalla-registro').classList.add('hidden');
            document.getElementById('pantalla-test').classList.remove('hidden');
            renderizarBloque();
        }

        function seleccionarRespuesta(idPregunta, valor) {
            respuestasUsuario[idPregunta] = valor;
            
            // Cambiar visualmente los botones de esa pregunta específica
            const btnSi = document.getElementById(`btn-si-${idPregunta}`);
            const btnNo = document.getElementById(`btn-no-${idPregunta}`);

            if (valor === "SÍ") {
                btnSi.className = "px-6 py-2 rounded-xl border-2 border-green-600 bg-green-600 text-white font-bold transition shadow-sm cursor-pointer";
                btnNo.className = "px-6 py-2 rounded-xl border-2 border-gray-200 bg-white text-gray-500 font-medium hover:bg-gray-50 transition cursor-pointer";
            } else {
                btnSi.className = "px-6 py-2 rounded-xl border-2 border-gray-200 bg-white text-gray-500 font-medium hover:bg-gray-50 transition cursor-pointer";
                btnNo.className = "px-6 py-2 rounded-xl border-2 border-red-600 bg-red-600 text-white font-bold transition shadow-sm cursor-pointer";
            }
        }

        function renderizarBloque() {
            const contenedor = document.getElementById('contenedor-preguntas');
            contenedor.innerHTML = '';
            
            const inicio = bloqueActual * preguntasPorBloque;
            const fin = inicio + preguntasPorBloque;
            const preguntasBloque = preguntas.slice(inicio, fin);

            preguntasBloque.forEach((p, index) => {
                const div = document.createElement('div');
                // Estilo de separación limpia entre ítems
                div.className = "pt-6 first:pt-2 flex flex-col md:flex-row md:items-center md:justify-between gap-4";

                const resActiva = respuestasUsuario[p.id];
                
                // Clases dinámicas dependiendo de si ya estaba respondida (por si vuelven atrás)
                const claseSi = resActiva === "SÍ" 
                    ? "px-6 py-2 rounded-xl border-2 border-green-600 bg-green-600 text-white font-bold transition shadow-sm cursor-pointer"
                    : "px-6 py-2 rounded-xl border-2 border-gray-200 bg-white text-gray-500 font-medium hover:bg-gray-50 transition cursor-pointer";
                
                const claseNo = resActiva === "NO"
                    ? "px-6 py-2 rounded-xl border-2 border-red-600 bg-red-600 text-white font-bold transition shadow-sm cursor-pointer"
                    : "px-6 py-2 rounded-xl border-2 border-gray-200 bg-white text-gray-500 font-medium hover:bg-gray-50 transition cursor-pointer";

                div.innerHTML = `
                    <div class="flex-1 text-sm md:text-base pr-4">
                        <p class="font-medium text-gray-700">
                            <span class="text-blue-600 font-bold mr-1">${p.id}.</span> ${p.texto}
                        </p>
                    </div>
                    <div class="flex items-center gap-3 shrink-0">
                        <button type="button" id="btn-si-${p.id}" onclick="seleccionarRespuesta(${p.id}, 'SÍ')" class="${claseSi}">SÍ</button>
                        <button type="button" id="btn-no-${p.id}" onclick="seleccionarRespuesta(${p.id}, 'NO')" class="${claseNo}">NO</button>
                    </div>
                `;
                contenedor.appendChild(div);
            });

            // Actualizar controles de paginación
            const totalBloques = Math.ceil(preguntas.length / preguntasPorBloque);
            document.getElementById('txt-progreso-bloque').innerText = `Bloque ${bloqueActual + 1} de ${totalBloques}`;
            
            const porcentaje = Math.round(((bloqueActual + 1) / totalBloques) * 100);
            document.getElementById('txt-progreso-porcentaje').innerText = `${porcentaje}% Completado`;
            document.getElementById('barra-progreso').style.width = `${porcentaje}%`;

            document.getElementById('btn-anterior').disabled = (bloqueActual === 0);
            document.getElementById('btn-siguiente').innerText = (bloqueActual === totalBloques - 1) ? 'Finalizar y Calcular' : 'Siguiente';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cambiarBloque(direccion) {
            const totalBloques = Math.ceil(preguntas.length / preguntasPorBloque);
            
            // Controlar si faltan responder preguntas en este bloque antes de avanzar
            if (direccion === 1) {
                const inicio = bloqueActual * preguntasPorBloque;
                const fin = inicio + preguntasPorBloque;
                const preguntasBloque = preguntas.slice(inicio, fin);
                
                const sinResponder = preguntasBloque.some(p => respuestasUsuario[p.id] === null);
                if (sinResponder) {
                    alert("Por favor, respondé todas las preguntas del bloque actual antes de continuar.");
                    return;
                }
            }

            if (direccion === 1 && bloqueActual === totalBloques - 1) {
                calcularYMostrarResultados();
            } else {
                bloqueActual += direccion;
                renderizarBloque();
            }
        }

        // Baremos Generales Oficiales del CHAEA
        function obtenerPreferencia(estilo, puntaje) {
            const baremos = {
                activo:     { muyBaja: [0,6],   baja: [7,8],   moderada: [9,12],  alta: [13,14], muyAlta: [15,20] },
                reflexivo:  { muyBaja: [0,10],  baja: [11,13], moderada: [14,17], alta: [18,19], muyAlta: [20,20] },
                teorico:    { muyBaja: [0,6],   baja: [7,9],   moderada: [10,13], alta: [14,15], muyAlta: [16,20] },
                pragmatico: { muyBaja: [0,8],   baja: [9,10],  moderada: [11,13], alta: [14,15], muyAlta: [16,20] }
            };

            const b = baremos[estilo];
            if (puntaje >= b.muyBaja[0] && puntaje <= b.muyBaja[1]) return "Muy Baja";
            if (puntaje >= b.baja[0] && puntaje <= b.baja[1]) return "Baja";
            if (puntaje >= b.moderada[0] && puntaje <= b.moderada[1]) return "Moderada";
            if (puntaje >= b.alta[0] && puntaje <= b.alta[1]) return "Alta";
            return "Muy Alta";
        }

        function calcularYMostrarResultados() {
            let puntajes = { activo: 0, reflexivo: 0, teorico: 0, pragmatico: 0 };

            // Sumamos punto solo si la respuesta explícita fue "SÍ"
            preguntas.forEach(p => {
                if (respuestasUsuario[p.id] === "SÍ") {
                    puntajes[p.estilo]++;
                }
            });

            document.getElementById('pantalla-test').classList.add('hidden');
            document.getElementById('pantalla-resultados').classList.remove('hidden');

            // Renderizar datos del alumno
            document.getElementById('res-metadata').innerText = `Estudiante: ${datosEstudiante.nombre} | Código: ${datosEstudiante.codigo} | Edad: ${datosEstudiante.edad} años | Fecha: ${datosEstudiante.fecha}`;

            // Renderizar la tabla analítica
            const cuerpo = document.getElementById('tabla-cuerpo');
            cuerpo.innerHTML = '';
            
            const mapeoEstilos = [
                { key: 'activo', label: 'E. ACTIVO', color: 'text-red-500' },
                { key: 'reflexivo', label: 'E. REFLEXIVO', color: 'text-blue-500' },
                { key: 'teorico', label: 'E. TEÓRICO', color: 'text-green-500' },
                { key: 'pragmatico', label: 'E. PRAGMÁTICO', color: 'text-purple-500' }
            ];

            mapeoEstilos.forEach(est => {
                const pto = puntajes[est.key];
                const pref = obtenerPreferencia(est.key, pto);
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-50";
                tr.innerHTML = `
                    <td class="py-3 font-semibold ${est.color}">${est.label}</td>
                    <td class="py-3 text-center font-bold text-lg text-gray-700">${pto} / 20</td>
                    <td class="py-3 text-right font-medium"><span class="px-3 py-1 rounded-full text-xs bg-gray-100 text-gray-700 font-bold">${pref}</span></td>
                `;
                cuerpo.appendChild(tr);
            });

            // Dibujar gráfico dinámico
            const ctx = document.getElementById('graficoRadar').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Activo', 'Reflexivo', 'Teórico', 'Pragmático'],
                    datasets: [{
                        label: 'Tu Perfil de Aprendizaje',
